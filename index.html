<!DOCTYPE html>
<html>
<head>
  <title>Private Media Viewer</title>
  <style>
    body{
      background:#111;
      color:white;
      font-family:Arial;
      text-align:center;
    }
    #login{
      margin-top:120px;
    }
    .gallery{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
    }
    img, video{
      width:300px;
      margin:10px;
      border-radius:10px;
    }
    button{
      padding:10px 20px;
      margin:10px;
    }
  </style>
</head>
<body>

<div id="login">
  <h2>Enter Password</h2>
  <input type="password" id="password">
  <button onclick="login()">Enter</button>
</div>

<div id="content" style="display:none">
  <h1>Media Library</h1>
  <div id="gallery" class="gallery"></div>
</div>

<script>
const username="ishantsub";
const repo="media-storage";

async function login(){
  let input=document.getElementById("password").value;

  // Get viewer password from settings.json
  let res=await fetch(`https://raw.githubusercontent.com/${username}/${repo}/main/config/settings.json`);
  let settings=await res.json();

  if(input===settings.viewerPassword){
    document.getElementById("login").style.display="none";
    document.getElementById("content").style.display="block";
    loadMedia();
  }else{
    alert("Wrong password");
  }
}

async function loadMedia(){
  // Load locked files
  let visRes=await fetch(`https://raw.githubusercontent.com/${username}/${repo}/main/config/visibility.json`);
  let vis=await visRes.json();
  let lockedFiles = vis.locked;

  // Load Photos
  let photosRes=await fetch(`https://api.github.com/repos/${username}/${repo}/contents/media/photos`);
  let photos=await photosRes.json();
  photos.forEach(file=>{
    if(!lockedFiles.includes(file.name)){
      let img=document.createElement("img");
      img.src=file.download_url;
      document.getElementById("gallery").appendChild(img);
    }
  });

  // Load Videos
  let videosRes=await fetch(`https://api.github.com/repos/${username}/${repo}/contents/media/videos`);
  let videos=await videosRes.json();
  videos.forEach(file=>{
    if(!lockedFiles.includes(file.name)){
      let video=document.createElement("video");
      video.src=file.download_url;
      video.controls=true;
      document.getElementById("gallery").appendChild(video);
    }
  });
}
</script>

</body>
</html>
